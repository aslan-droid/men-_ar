<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      .button-container {
        position: fixed; bottom: 20px; left: 0; right: 0; text-align: center; z-index: 1000;
        display: flex; justify-content: center; gap: 10px;
      }
      button {
        padding: 12px 18px; font-size: 14px; cursor: pointer; border-radius: 12px;
        border: 2px solid #ffcc00; background: rgba(0,0,0,0.8); color: white; font-weight: bold;
      }
      button:active { background: #ffcc00; color: black; }
    </style>
  </head>
  <body>
    <div class="button-container">
      <button onclick="showGroup('yemek')">YEMEKLER</button>
      <button onclick="showGroup('icecek')">İÇECEKLER</button>
      <button onclick="showGroup('tatli')">TATLILAR</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./menü.mind; uiScanning: no;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="hamb" src="./hamburger.glb"></a-asset-item>
        <a-asset-item id="pizz" src="./pizza.glb"></a-asset-item>
        <a-asset-item id="kofte" src="./mustafa-_cig_kofte.glb"></a-asset-item>
        <a-asset-item id="cola" src="./coca_cola_bottle_glass.glb"></a-asset-item>
        <a-asset-item id="ayran" src="./ayran_turkish_drink_game_asset.glb"></a-asset-item>
        <a-asset-item id="baklava" src="./baklava_ince_tabak.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient" intensity="1.5"></a-light>
      <a-light type="directional" position="0 10 0" intensity="1"></a-light>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-entity id="yemekGrubu" visible="true">
          <a-gltf-model src="#hamb" position="0 0 0" scale="0.05 0.05 0.05"></a-gltf-model>
          <a-gltf-model src="#pizz" position="0 -0.2 0" scale="0.2 0.2 0.2"></a-gltf-model>
          <a-gltf-model src="#kofte" position="0 0.2 0" scale="0.15 0.15 0.15"></a-gltf-model>
        </a-entity>

        <a-entity id="icecekGrubu" visible="false">
          <a-gltf-model src="#cola" position="0 -0.1 0" scale="0.4 0.4 0.4"></a-gltf-model>
          <a-gltf-model src="#ayran" position="0 0.1 0" scale="0.3 0.3 0.3"></a-gltf-model>
        </a-entity>

        <a-entity id="tatliGrubu" visible="false">
          <a-gltf-model src="#baklava" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      function showGroup(group) {
        // Hangi butona basılırsa o grubun visible değerini true, diğerlerini false yapıyoruz
        document.getElementById('yemekGrubu').setAttribute('visible', group === 'yemek');
        document.getElementById('icecekGrubu').setAttribute('visible', group === 'icecek');
        document.getElementById('tatliGrubu').setAttribute('visible', group === 'tatli');
      }
    </script>
  </body>
</html>
