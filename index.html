<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      .menu-buttons {
        position: fixed; bottom: 30px; left: 0; right: 0; text-align: center; z-index: 1000;
      }
      button {
        padding: 12px 18px; font-size: 14px; cursor: pointer; border-radius: 20px; border: 2px solid #ffcc00; background: rgba(0,0,0,0.7); color: white; margin: 0 5px; font-weight: bold;
      }
      button:active { background: #ffcc00; color: black; }
    </style>
  </head>
  <body>
    <div class="menu-buttons">
      <button onclick="showModel('yemek')">YEMEKLER</button>
      <button onclick="showModel('icecek')">İÇECEKLER</button>
      <button onclick="showModel('tatli')">TATLILAR</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./menü.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <a-asset-item id="yemekModel" src="./hamburger.glb"></a-asset-item>
        <a-asset-item id="icecekModel" src="./coca_cola_bottle_glass.glb"></a-asset-item>
        <a-asset-item id="tatliModel" src="./baklava_ince_tabak.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model id="yemekObj" src="#yemekModel" position="0 0 0" scale="0.2 0.2 0.2" visible="true"></a-gltf-model>
        
        <a-gltf-model id="icecekObj" src="#icecekModel" position="0 0 0" scale="0.2 0.2 0.2" visible="false"></a-gltf-model>
        
        <a-gltf-model id="tatliObj" src="#tatliModel" position="0 0 0" scale="0.2 0.2 0.2" visible="false"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      function showModel(type) {
        document.getElementById('yemekObj').setAttribute('visible', type === 'yemek');
        document.getElementById('icecekObj').setAttribute('visible', type === 'icecek');
        document.getElementById('tatliObj').setAttribute('visible', type === 'tatli');
      }
    </script>
  </body>
</html>
